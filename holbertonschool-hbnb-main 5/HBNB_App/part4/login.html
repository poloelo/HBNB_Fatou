<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="logo.png" alt="HBnB Logo" class="logo" />
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button">Login</a>
      </nav>
    </header>

    <main>
      <div class="auth-wrapper">
        <div class="auth-card">
          <h1>Welcome back</h1>
          <p class="subtitle">Sign in to your HBnB account</p>

          <form id="login-form" action="#" method="post" novalidate>
            <div class="form-group">
              <label for="email">admin@hbnb.io</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="password">1234!</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="btn-primary">Sign In</button>
          </form>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="login.js"></script>
  </body>
</html>
