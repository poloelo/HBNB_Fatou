<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="logo.png" alt="HBnB Logo" class="logo" />
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button">Login</a>
      </nav>
    </header>

    <main>
      <a href="place.html" class="back-link">&#8592; Back to place</a>

      <section class="add-review">
        <h2>Add a Review</h2>

        <form class="form" id="review-form" action="#" method="post" novalidate>

          <div class="form-group">
            <label for="rating">Your rating</label>
            <div class="star-rating" id="rating">
              <input type="radio" id="star5" name="rating" value="5" />
              <label for="star5" title="5 stars">&#9733;</label>
              <input type="radio" id="star4" name="rating" value="4" />
              <label for="star4" title="4 stars">&#9733;</label>
              <input type="radio" id="star3" name="rating" value="3" />
              <label for="star3" title="3 stars">&#9733;</label>
              <input type="radio" id="star2" name="rating" value="2" />
              <label for="star2" title="2 stars">&#9733;</label>
              <input type="radio" id="star1" name="rating" value="1" />
              <label for="star1" title="1 star">&#9733;</label>
            </div>
          </div>

          <div class="form-group">
            <label for="comment">Your review</label>
            <textarea
              id="comment"
              name="comment"
              rows="5"
              placeholder="Share your experience with this place..."
              required
            ></textarea>
          </div>

          <button type="submit" class="btn-primary">Submit Review</button>

        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="add_review.js"></script>
  </body>
</html>
